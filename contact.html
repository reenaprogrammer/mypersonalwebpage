    <main class="contact-container">
        <h1>Get In Touch ✉️</h1>
        <p>I'm always open to discussing web development, college projects, or new opportunities!</p>
        
        <form class="contact-form">
            <div class="form-group">
                <label>Name</label>
                <input type="text" placeholder="Your Name" required>
            </div>
            
            <div class="form-group">
                <label>Email</label>
                <input type="email" placeholder="email@example.com" required>
            </div>
            <div class="form-group">
                <label>Message</label>
                <textarea rows="5" placeholder="How can I help you?"></textarea>
            </div>
            <button type="submit" class="submit-btn">Send Message 🚀</button>
            <div class="social-links">
    <h3>Find me elsewhere:</h3>
    <div class="social-icons">
        <a href="https://github.com/reenaprogrammer" target="_blank" title="GitHub">💻 GitHub</a>

        <a href="mailto:reenaprogrammer@gmail.com" title="Email">✉️ Direct Email</a>

</div>
